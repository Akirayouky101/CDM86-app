<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiamate — CDM86 Collaboratori</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; min-height: 100vh; }

        /* ─── SIDEBAR ─────────────────────────────────────── */
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 240px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: white; display: flex; flex-direction: column; z-index: 200; overflow-y: auto; transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo .brand { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; }
        .sidebar-logo .brand i { color: #fbbf24; }
        .sidebar-logo .subtitle { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
        nav { flex: 1; padding: 20px 12px; }
        nav a { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; transition: all 0.2s; }
        nav a:hover { background: rgba(255,255,255,0.08); color: white; }
        nav a.active { background: rgba(251,191,36,0.15); color: #fbbf24; }
        nav a i { width: 18px; text-align: center; }
        .sidebar-user { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.85rem; }
        .sidebar-user .name { font-weight: 700; color: white; }
        .sidebar-user .email { color: #94a3b8; font-size: 0.75rem; margin-top: 2px; }
        .sidebar-user .logout { display: inline-flex; align-items: center; gap: 6px; color: #64748b; font-size: 0.75rem; cursor: pointer; margin-top: 8px; transition: color 0.2s; }
        .sidebar-user .logout:hover { color: #ef4444; }

        /* ─── MAIN ─────────────────────────────────────────── */
        .main { margin-left: 0; padding: 28px 32px; transition: margin-left 0.28s cubic-bezier(0.4,0,0.2,1); }
        body.sidebar-open .main { margin-left: 240px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .page-header h1 { font-size: 1.6rem; font-weight: 800; color: #0f172a; }
        .page-header p { color: #64748b; margin-top: 4px; }
        .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: #0f172a; color: white; border: none; padding: 11px 22px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-primary:hover { background: #1e293b; }

        /* ─── STATS ROW ──────────────────────────────────────── */
        .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-mini { background: white; border-radius: 12px; padding: 16px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); text-align: center; }
        .stat-mini .val { font-size: 1.4rem; font-weight: 800; color: #0f172a; }
        .stat-mini .lbl { font-size: 0.72rem; color: #94a3b8; margin-top: 3px; }

        /* ─── FILTERS ─────────────────────────────────────── */
        .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; color: #64748b; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { border-color: #0f172a; color: #0f172a; }
        .filter-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
        .search-box { padding: 7px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px; font-size: 0.82rem; outline: none; min-width: 200px; }
        .search-box:focus { border-color: #0f172a; }

        /* ─── TABLE WRAPPER ──────────────────────────────────── */
        .table-wrap { background: white; border-radius: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 12px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; background: #f8fafc; border-bottom: 1px solid #f1f5f9; }
        tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
        tbody tr:hover { background: #f8fafc; }
        tbody tr:last-child { border-bottom: none; }
        td { padding: 13px 16px; font-size: 0.875rem; color: #374151; vertical-align: middle; }

        .contact-name { font-weight: 700; color: #0f172a; }
        .contact-phone { font-size: 0.8rem; color: #64748b; margin-top: 2px; }

        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; white-space: nowrap; }
        .outcome-pending       { background: #fefce8; color: #ca8a04; }
        .outcome-answered      { background: #eff6ff; color: #2563eb; }
        .outcome-no_answer     { background: #f1f5f9; color: #64748b; }
        .outcome-callback      { background: #faf5ff; color: #9333ea; }
        .outcome-not_interested{ background: #fef2f2; color: #dc2626; }
        .outcome-converted     { background: #f0fdf4; color: #16a34a; }

        .callback-date { font-size: 0.78rem; color: #9333ea; font-weight: 600; }

        .icon-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 6px 8px; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s; }
        .icon-btn:hover { background: #f1f5f9; color: #0f172a; }
        .icon-btn.delete:hover { background: #fef2f2; color: #dc2626; }
        .icon-btn.call-btn { color: #16a34a; }
        .icon-btn.call-btn:hover { background: #f0fdf4; }

        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; margin-bottom: 14px; display: block; }
        .empty-state h3 { font-size: 1.1rem; color: #64748b; margin-bottom: 6px; }

        /* ─── MODAL ─────────────────────────────────────────── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 560px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 1.2rem; font-weight: 800; color: #0f172a; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 0.9rem; outline: none; transition: border 0.2s; font-family: inherit; }
        .form-control:focus { border-color: #0f172a; }
        textarea.form-control { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .btn-cancel { padding: 10px 20px; border: 1.5px solid #e5e7eb; background: white; border-radius: 10px; font-size: 0.875rem; font-weight: 600; cursor: pointer; color: #64748b; }
        .btn-save { padding: 10px 22px; background: #0f172a; color: white; border: none; border-radius: 10px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }

        .loading { text-align: center; padding: 40px; color: #64748b; }

        /* ─── TOAST ─────────────────────────────────────────── */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 12px; font-size: 0.875rem; font-weight: 600; color: white; box-shadow: 0 8px 24px rgba(0,0,0,0.18); pointer-events: all; min-width: 280px; max-width: 380px; animation: slideIn 0.3s ease; }
        .toast.success { background: #16a34a; }
        .toast.error   { background: #dc2626; }
        .toast.info    { background: #2563eb; }
        .toast i { font-size: 1rem; flex-shrink: 0; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }

        /* ─── SAVE BUTTON LOADING ────────────────────────────── */
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

        @media (max-width: 1200px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }

        /* ── Mobile call cards ── */
        .call-cards { display: none; flex-direction: column; gap: 12px; padding: 14px; }
        .call-card {
            background: white; border-radius: 14px; padding: 16px 18px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            border-left: 4px solid #e5e7eb;
        }
        .call-card.oc-pending        { border-left-color: #ca8a04; }
        .call-card.oc-answered       { border-left-color: #2563eb; }
        .call-card.oc-callback       { border-left-color: #9333ea; }
        .call-card.oc-converted      { border-left-color: #16a34a; }
        .call-card.oc-not_interested { border-left-color: #dc2626; }
        .cc-top  { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
        .cc-name { font-weight: 700; color: #0f172a; font-size: 0.92rem; }
        .cc-phone{ font-size: 0.82rem; color: #16a34a; font-weight: 600; margin-top: 2px; }
        .cc-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
        .cc-notes{ font-size: 0.75rem; color: #64748b; margin-top: 6px; font-style: italic; }
        .cc-callback { font-size: 0.75rem; color: #9333ea; font-weight: 600; margin-top: 4px; }
        .cc-actions { display: flex; gap: 8px; margin-top: 10px; }
        .cc-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
        .cc-btn.call  { background: #f0fdf4; color: #16a34a; }
        .cc-btn.edit  { background: #f1f5f9; color: #374151; }
        .cc-btn.del   { background: #fef2f2; color: #dc2626; }

        @media (max-width: 768px) {
            .table-wrap { display: none; }
            .call-cards { display: flex; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .filters { gap: 6px; }
            .search-box { width: 100%; min-width: 0; }
        }

        /* ─── SEGNALIBRO MENU MOBILE ────────────────────────── */
        .menu-tab {
            display: flex;
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            z-index: 300;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #fbbf24;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            padding: 18px 8px;
            border-radius: 0 10px 10px 0;
            cursor: grab;
            border: none;
            box-shadow: 3px 0 16px rgba(0,0,0,0.25);
            transition: padding 0.2s, background 0.2s, top 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            border-left: 3px solid #fbbf24;
        }
        .menu-tab:hover { padding: 18px 11px; }
        .menu-tab.open { left: 240px; border-radius: 0 10px 10px 0; border-left: none; border-right: 3px solid #fbbf24; }

        /* Overlay solo su mobile */
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 150;
            -webkit-backdrop-filter: blur(2px);
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) {
            .sidebar-overlay.active { display: block; }
        }

        @media (max-width: 768px) {
            .main { padding: 16px 14px 24px 14px !important; }
        }
    </style>
</head>
<body>
<button class="menu-tab" id="menuTab" onclick="toggleMenu()" aria-label="Menu">CDM86</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>


<div id="toast-container"></div>

<div class="sidebar">
    <div class="sidebar-logo">
        <div class="brand"><i class="fas fa-handshake"></i> CDM86</div>
        <div class="subtitle">Pannello Collaboratori</div>
    </div>
    <nav>
        <a href="/collaboratori/dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/collaboratori/rete.html"><i class="fas fa-sitemap"></i> La mia rete</a>
        <a href="/collaboratori/guadagni.html"><i class="fas fa-euro-sign"></i> Guadagni</a>
        <a href="/collaboratori/task.html"><i class="fas fa-check-square"></i> Task</a>
        <a href="/collaboratori/chiamate.html" class="active"><i class="fas fa-phone"></i> Chiamate</a>
        <a href="/collaboratori/note.html"><i class="fas fa-sticky-note"></i> Note</a>
        <a href="/collaboratori/profilo.html"><i class="fas fa-user-circle"></i> Profilo</a>
    </nav>
    <div class="sidebar-user">
        <div class="name" id="sidebarName">—</div>
        <div class="email" id="sidebarEmail">—</div>
        <div class="logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Esci</div>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <div>
            <h1><i class="fas fa-phone" style="color:#16a34a; margin-right:10px;"></i>Gestione Chiamate</h1>
            <p>Registra e traccia le tue chiamate commerciali</p>
        </div>
        <button class="btn-primary" onclick="openModal()">
            <i class="fas fa-plus"></i> Nuova chiamata
        </button>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow">
        <div class="stat-mini"><div class="val" id="sTot">0</div><div class="lbl">Totale</div></div>
        <div class="stat-mini"><div class="val" id="sConv" style="color:#16a34a;">0</div><div class="lbl">Convertite</div></div>
        <div class="stat-mini"><div class="val" id="sCb" style="color:#9333ea;">0</div><div class="lbl">Richiamare</div></div>
        <div class="stat-mini"><div class="val" id="sNo" style="color:#64748b;">0</div><div class="lbl">Non risposto</div></div>
        <div class="stat-mini"><div class="val" id="sPend" style="color:#ca8a04;">0</div><div class="lbl">Da chiamare</div></div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Tutte</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Da chiamare</button>
        <button class="filter-btn" onclick="setFilter('callback', this)">Richiamare</button>
        <button class="filter-btn" onclick="setFilter('converted', this)">Convertite</button>
        <button class="filter-btn" onclick="setFilter('not_interested', this)">Non interessati</button>
        <input type="text" class="search-box" id="searchBox" placeholder="🔍 Cerca contatto..." oninput="renderCalls()">
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Contatto</th>
                    <th>Azienda</th>
                    <th>Esito</th>
                    <th>Richiama il</th>
                    <th>Data</th>
                    <th>Note</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="callsBody">
                <tr><td colspan="7"><div class="loading"><i class="fas fa-spinner fa-spin"></i></div></td></tr>
            </tbody>
        </table>
    </div>

    <!-- Mobile call cards -->
    <div class="call-cards" id="callCards"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="callModal">
    <div class="modal">
        <h2 id="modalTitle">Nuova Chiamata</h2>
        <input type="hidden" id="editCallId">
        <div class="form-row">
            <div class="form-group">
                <label>Nome contatto *</label>
                <input type="text" class="form-control" id="callName" placeholder="Mario Rossi">
            </div>
            <div class="form-group">
                <label>Telefono</label>
                <input type="tel" class="form-control" id="callPhone" placeholder="+39 333 1234567">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Azienda</label>
                <input type="text" class="form-control" id="callCompany" placeholder="Nome azienda">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="callEmail" placeholder="email@example.com">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Esito chiamata</label>
                <select class="form-control" id="callOutcome">
                    <option value="pending">⏳ Da chiamare</option>
                    <option value="answered">📞 Risposto</option>
                    <option value="no_answer">📵 Non risposto</option>
                    <option value="callback">🔔 Richiamare</option>
                    <option value="not_interested">❌ Non interessato</option>
                    <option value="converted">✅ Convertito</option>
                </select>
            </div>
            <div class="form-group">
                <label>Data richiamo</label>
                <input type="datetime-local" class="form-control" id="callCallback">
            </div>
        </div>
        <div class="form-group">
            <label>Note</label>
            <textarea class="form-control" id="callNotes" placeholder="Appunti sulla chiamata..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Annulla</button>
            <button class="btn-save" onclick="saveCall()"><i class="fas fa-save"></i> Salva</button>
        </div>
    </div>
</div>

<script>
    let sb, currentUser, collab, allCalls = [], currentFilter = 'all';

    window.addEventListener('DOMContentLoaded', async () => {
        sb = supabase.createClient(CDM86_CONFIG.supabase.url, CDM86_CONFIG.supabase.anonKey);
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = '/collaboratori/login.html'; return; }
        currentUser = session.user;

        const { data: user } = await sb.from('collaborators').select('*').eq('auth_user_id', currentUser.id).single();
        if (!user || user.status !== 'active') { window.location.href = '/collaboratori/login.html'; return; }

        collab = user;
        document.getElementById('sidebarName').textContent  = `${user.first_name} ${user.last_name}`;
        document.getElementById('sidebarEmail').textContent = user.email;

        await loadCalls();
    });

    async function loadCalls() {
        const { data } = await sb
            .from('collaborator_calls')
            .select('*')
            .eq('collaborator_id', collab.id)
            .order('created_at', { ascending: false });

        allCalls = data || [];
        updateStats();
        renderCalls();
    }

    function updateStats() {
        document.getElementById('sTot').textContent  = allCalls.length;
        document.getElementById('sConv').textContent = allCalls.filter(c => c.outcome === 'converted').length;
        document.getElementById('sCb').textContent   = allCalls.filter(c => c.outcome === 'callback').length;
        document.getElementById('sNo').textContent   = allCalls.filter(c => c.outcome === 'no_answer').length;
        document.getElementById('sPend').textContent = allCalls.filter(c => c.outcome === 'pending').length;
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCalls();
    }

    function renderCalls() {
        const search = document.getElementById('searchBox').value.toLowerCase();
        let calls = allCalls;

        if (currentFilter !== 'all') calls = calls.filter(c => c.outcome === currentFilter);
        if (search) calls = calls.filter(c =>
            (c.contact_name||'').toLowerCase().includes(search) ||
            (c.contact_email||'').toLowerCase().includes(search) ||
            (c.contact_phone||'').includes(search)
        );

        const tbody = document.getElementById('callsBody');
        const cards = document.getElementById('callCards');
        if (calls.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fas fa-phone-slash"></i><h3>Nessuna chiamata trovata</h3></div></td></tr>`;
            cards.innerHTML = `<div class="empty-state"><i class="fas fa-phone-slash"></i><h3>Nessuna chiamata trovata</h3></div>`;
            return;
        }

        const outcomeLabels = {
            pending:        '<span class="badge outcome-pending">⏳ Da chiamare</span>',
            answered:       '<span class="badge outcome-answered">📞 Risposto</span>',
            no_answer:      '<span class="badge outcome-no_answer">📵 Non risposto</span>',
            callback:       '<span class="badge outcome-callback">🔔 Richiamare</span>',
            not_interested: '<span class="badge outcome-not_interested">❌ Non interessato</span>',
            converted:      '<span class="badge outcome-converted">✅ Convertito</span>',
        };

        tbody.innerHTML = calls.map(c => {
            const callbackHtml = c.callback_at
                ? `<span class="callback-date"><i class="fas fa-clock"></i> ${new Date(c.callback_at).toLocaleString('it-IT', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>`
                : '<span style="color:#e2e8f0;">—</span>';

            const dateStr = new Date(c.created_at).toLocaleDateString('it-IT');

            const notesHtml = c.notes
                ? `<span title="${escHtml(c.notes)}" style="cursor:help;color:#64748b;font-size:0.78rem;">${escHtml(c.notes.substring(0,30))}${c.notes.length > 30 ? '…' : ''}</span>`
                : '<span style="color:#e2e8f0;">—</span>';

            const phoneLink = c.contact_phone
                ? `<a href="tel:${c.contact_phone}" style="color:#16a34a;font-weight:600;font-size:0.8rem;text-decoration:none;">${escHtml(c.contact_phone)}</a>`
                : '—';

            return `
            <tr>
                <td>
                    <div class="contact-name">${escHtml(c.contact_name)}</div>
                    <div class="contact-phone">${phoneLink}</div>
                </td>
                <td>${c.contact_email ? escHtml(c.contact_email) : '<span style="color:#e2e8f0;">—</span>'}</td>
                <td>${outcomeLabels[c.outcome] || c.outcome}</td>
                <td>${callbackHtml}</td>
                <td style="color:#94a3b8;font-size:0.8rem;">${dateStr}</td>
                <td>${notesHtml}</td>
                <td>
                    <div style="display:flex;gap:4px;">
                        ${c.contact_phone ? `<button class="icon-btn call-btn" onclick="window.open('tel:${escHtml(c.contact_phone)}')" title="Chiama"><i class="fas fa-phone"></i></button>` : ''}
                        <button class="icon-btn" onclick="editCall('${c.id}')" title="Modifica"><i class="fas fa-pen"></i></button>
                        <button class="icon-btn delete" onclick="deleteCall('${c.id}')" title="Elimina"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            </tr>`;
        }).join('');

        // Mobile call cards
        cards.innerHTML = calls.map(c => {
            const dateStr = new Date(c.created_at).toLocaleDateString('it-IT');
            const outcomeKey = c.outcome || 'pending';
            const outcomeBadge = outcomeLabels[outcomeKey] || outcomeKey;
            const callbackStr = c.callback_at
                ? `<div class="cc-callback"><i class="fas fa-clock"></i> Richiama: ${new Date(c.callback_at).toLocaleString('it-IT', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>`
                : '';
            return `
            <div class="call-card oc-${outcomeKey}">
                <div class="cc-top">
                    <div>
                        <div class="cc-name">${escHtml(c.contact_name)}</div>
                        ${c.contact_phone ? `<div class="cc-phone"><i class="fas fa-phone-alt"></i> ${escHtml(c.contact_phone)}</div>` : ''}
                    </div>
                    <div style="font-size:0.72rem;color:#94a3b8;white-space:nowrap;">${dateStr}</div>
                </div>
                <div class="cc-meta">${outcomeBadge}</div>
                ${callbackStr}
                ${c.notes ? `<div class="cc-notes">${escHtml(c.notes.substring(0,80))}${c.notes.length>80?'…':''}</div>` : ''}
                <div class="cc-actions">
                    ${c.contact_phone ? `<button class="cc-btn call" onclick="window.location.href='tel:${escHtml(c.contact_phone)}'"><i class="fas fa-phone"></i> Chiama</button>` : ''}
                    <button class="cc-btn edit" onclick="editCall('${c.id}')"><i class="fas fa-pen"></i> Modifica</button>
                    <button class="cc-btn del"  onclick="deleteCall('${c.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    function openModal(call = null) {
        document.getElementById('callModal').classList.add('open');
        document.getElementById('editCallId').value     = call ? call.id : '';
        document.getElementById('modalTitle').textContent = call ? 'Modifica Chiamata' : 'Nuova Chiamata';
        document.getElementById('callName').value        = call ? call.contact_name : '';
        document.getElementById('callPhone').value       = call ? (call.contact_phone || '') : '';
        document.getElementById('callCompany').value     = call ? (call.contact_email || '') : '';
        document.getElementById('callEmail').value       = call ? (call.contact_email || '') : '';
        document.getElementById('callOutcome').value     = call ? call.outcome : 'pending';
        document.getElementById('callNotes').value       = call ? (call.notes || '') : '';
        if (call && call.callback_at) {
            const d = new Date(call.callback_at);
            document.getElementById('callCallback').value = d.toISOString().slice(0,16);
        } else {
            document.getElementById('callCallback').value = '';
        }
    }

    function closeModal() {
        document.getElementById('callModal').classList.remove('open');
    }

    function editCall(id) {
        const call = allCalls.find(c => c.id == id);
        if (call) openModal(call);
    }

    async function saveCall() {
        const id   = document.getElementById('editCallId').value;
        const name = document.getElementById('callName').value.trim();
        if (!name) { showToast('Il nome contatto è obbligatorio', 'error'); return; }

        const btn = document.querySelector('.btn-save');
        btn.disabled = true;
        btn.textContent = 'Salvataggio…';

        const payload = {
            contact_name:  name,
            contact_phone: document.getElementById('callPhone').value.trim() || null,
            contact_email: document.getElementById('callEmail').value.trim() || null,
            outcome:       document.getElementById('callOutcome').value,
            notes:         document.getElementById('callNotes').value.trim() || null,
            callback_at:   document.getElementById('callCallback').value || null,
        };

        let error;
        if (id) {
            ({ error } = await sb.from('collaborator_calls').update(payload).eq('id', id));
        } else {
            payload.collaborator_id = collab.id;
            ({ error } = await sb.from('collaborator_calls').insert(payload));
        }

        btn.disabled = false;
        btn.textContent = 'Salva';

        if (error) {
            console.error('saveCall error:', error);
            showToast('Errore nel salvataggio: ' + error.message, 'error');
            return;
        }

        showToast(id ? '✅ Chiamata aggiornata!' : '✅ Chiamata aggiunta!', 'success');
        closeModal();
        await loadCalls();
    }

    async function deleteCall(id) {
        if (!confirm('Eliminare questa chiamata?')) return;
        const { error } = await sb.from('collaborator_calls').delete().eq('id', id);
        if (error) { showToast('Errore eliminazione: ' + error.message, 'error'); return; }
        allCalls = allCalls.filter(c => c.id != id);
        updateStats();
        renderCalls();
        showToast('🗑️ Chiamata eliminata', 'info');
    }

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-times-circle' : 'fa-info-circle';
        t.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
        container.appendChild(t);
        setTimeout(() => {
            t.style.animation = 'slideOut 0.3s ease forwards';
            setTimeout(() => t.remove(), 300);
        }, 3500);
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function logout() {
        await sb.auth.signOut();
        window.location.href = '/collaboratori/login.html';
    }

    document.getElementById('callModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

        /* ── Menu tab: toggle + drag verticale ── */
        (function() {
            const STORAGE_KEY = 'cdm86_tab_top';
            let isDragging = false;
            let dragStartY = 0;
            let tabStartTop = 0;
            let movedEnough = false;

            function getTab() { return document.getElementById('menuTab'); }

            function applyStoredPosition() {
                const tab = getTab();
                if (!tab) return;
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    tab.style.top = saved;
                    tab.style.transform = 'none';
                } else {
                    tab.style.top = '50%';
                    tab.style.transform = 'translateY(-50%)';
                }
            }

            function onDragStart(e) {
                const tab = getTab();
                isDragging = false;
                movedEnough = false;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragStartY = clientY;
                // Converti top% in px se necessario
                const rect = tab.getBoundingClientRect();
                tabStartTop = rect.top + rect.height / 2;
                tab.style.transition = 'padding 0.2s, background 0.2s';
                tab.style.cursor = 'grabbing';

                document.addEventListener('mousemove', onDragMove, {passive:false});
                document.addEventListener('touchmove', onDragMove, {passive:false});
                document.addEventListener('mouseup', onDragEnd);
                document.addEventListener('touchend', onDragEnd);
            }

            function onDragMove(e) {
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dy = clientY - dragStartY;
                if (Math.abs(dy) > 6) {
                    isDragging = true;
                    movedEnough = true;
                    if (e.cancelable) e.preventDefault();
                }
                if (!isDragging) return;
                const tab = getTab();
                let newTop = tabStartTop + dy;
                // Clamp tra 40px e altezza schermo - 40px
                const minTop = 40;
                const maxTop = window.innerHeight - 40;
                newTop = Math.max(minTop, Math.min(maxTop, newTop));
                tab.style.top = newTop + 'px';
                tab.style.transform = 'none';
            }

            function onDragEnd(e) {
                document.removeEventListener('mousemove', onDragMove);
                document.removeEventListener('touchmove', onDragMove);
                document.removeEventListener('mouseup', onDragEnd);
                document.removeEventListener('touchend', onDragEnd);
                const tab = getTab();
                tab.style.cursor = 'grab';
                tab.style.transition = 'padding 0.2s, background 0.2s, top 0.15s ease';
                if (movedEnough) {
                    localStorage.setItem(STORAGE_KEY, tab.style.top);
                }
            }

            window.toggleMenu = function() {
                if (movedEnough) { movedEnough = false; return; }
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                const tab     = getTab();
                const isOpen  = sidebar.classList.toggle('open');
                // Overlay solo su mobile
                if (window.innerWidth <= 768) {
                    overlay.classList.toggle('active', isOpen);
                }
                tab.classList.toggle('open', isOpen);
                document.body.classList.toggle('sidebar-open', isOpen);
                // Salva stato in localStorage
                localStorage.setItem('cdm86_sidebar_open', isOpen ? '1' : '0');
            };

            window.addEventListener('DOMContentLoaded', function() {
                applyStoredPosition();
                // Ripristina stato sidebar solo su desktop
                const sidebarWasOpen = localStorage.getItem('cdm86_sidebar_open') === '1';
                if (sidebarWasOpen && window.innerWidth > 768) {
                    const sidebar = document.querySelector('.sidebar');
                    const tab     = getTab();
                    sidebar.classList.add('open');
                    if (tab) tab.classList.add('open');
                    document.body.classList.add('sidebar-open');
                }
                const tab = getTab();
                if (!tab) return;
                tab.addEventListener('mousedown', onDragStart);
                tab.addEventListener('touchstart', onDragStart, {passive:true});
            });
        })();
    </script>
