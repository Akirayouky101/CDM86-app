<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task — CDM86 Collaboratori</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; min-height: 100vh; }

        /* ─── SIDEBAR ─────────────────────────────────────── */
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 240px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: white; display: flex; flex-direction: column; z-index: 200; overflow-y: auto; transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo .brand { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; }
        .sidebar-logo .brand i { color: #fbbf24; }
        .sidebar-logo .subtitle { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
        nav { flex: 1; padding: 20px 12px; }
        nav a { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; transition: all 0.2s; }
        nav a:hover { background: rgba(255,255,255,0.08); color: white; }
        nav a.active { background: rgba(251,191,36,0.15); color: #fbbf24; }
        nav a i { width: 18px; text-align: center; }
        .sidebar-user { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.85rem; }
        .sidebar-user .name { font-weight: 700; color: white; }
        .sidebar-user .email { color: #94a3b8; font-size: 0.75rem; margin-top: 2px; }
        .sidebar-user .logout { display: inline-flex; align-items: center; gap: 6px; color: #64748b; font-size: 0.75rem; cursor: pointer; margin-top: 8px; transition: color 0.2s; }
        .sidebar-user .logout:hover { color: #ef4444; }

        /* ─── MAIN ─────────────────────────────────────────── */
        .main { margin-left: 0; padding: 28px 32px; transition: margin-left 0.28s cubic-bezier(0.4,0,0.2,1); }
        body.sidebar-open .main { margin-left: 240px; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .page-header h1 { font-size: 1.6rem; font-weight: 800; color: #0f172a; }
        .page-header p { color: #64748b; margin-top: 4px; }
        .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: #0f172a; color: white; border: none; padding: 11px 22px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-primary:hover { background: #1e293b; }

        /* ─── FILTERS ─────────────────────────────────────── */
        .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; color: #64748b; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { border-color: #0f172a; color: #0f172a; }
        .filter-btn.active { background: #0f172a; color: white; border-color: #0f172a; }

        /* ─── KANBAN / LIST ───────────────────────────────── */
        .task-list { display: flex; flex-direction: column; gap: 10px; }

        .task-card {
            background: white;
            border-radius: 14px;
            padding: 18px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: box-shadow 0.2s;
        }
        .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .task-card.done { opacity: 0.6; }

        .task-check {
            width: 22px; height: 22px; min-width: 22px;
            border: 2.5px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            margin-top: 2px;
        }
        .task-check.checked { background: #16a34a; border-color: #16a34a; color: white; font-size: 0.7rem; }
        .task-check.in-progress-check { background: #3b82f6; border-color: #3b82f6; color: white; font-size: 0.7rem; }

        .task-body { flex: 1; min-width: 0; }
        .task-title { font-size: 0.95rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
        .task-desc { font-size: 0.82rem; color: #64748b; margin-bottom: 8px; line-height: 1.4; }
        .task-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 700; }
        .badge-todo     { background: #f1f5f9; color: #64748b; }
        .badge-progress { background: #eff6ff; color: #2563eb; }
        .badge-done     { background: #f0fdf4; color: #16a34a; }
        .badge-high     { background: #fef2f2; color: #dc2626; }
        .badge-medium   { background: #fefce8; color: #ca8a04; }
        .badge-low      { background: #f0fdf4; color: #16a34a; }

        .due-date { font-size: 0.75rem; color: #94a3b8; display: flex; align-items: center; gap: 4px; }
        .due-date.overdue { color: #dc2626; }

        .task-actions { display: flex; gap: 6px; margin-top: -2px; }
        .icon-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 6px; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s; }
        .icon-btn:hover { background: #f1f5f9; color: #0f172a; }
        .icon-btn.delete:hover { background: #fef2f2; color: #dc2626; }

        /* ─── EMPTY ─────────────────────────────────────────── */
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; margin-bottom: 14px; display: block; }
        .empty-state h3 { font-size: 1.1rem; color: #64748b; margin-bottom: 6px; }

        /* ─── MODAL ─────────────────────────────────────────── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal h2 { font-size: 1.2rem; font-weight: 800; color: #0f172a; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 0.9rem; outline: none; transition: border 0.2s; font-family: inherit; }
        .form-control:focus { border-color: #0f172a; }
        textarea.form-control { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .btn-cancel { padding: 10px 20px; border: 1.5px solid #e5e7eb; background: white; border-radius: 10px; font-size: 0.875rem; font-weight: 600; cursor: pointer; color: #64748b; }
        .btn-save { padding: 10px 22px; background: #0f172a; color: white; border: none; border-radius: 10px; font-size: 0.875rem; font-weight: 600; cursor: pointer; }

        .loading { text-align: center; padding: 60px; color: #64748b; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
        }
        /* ─── SEGNALIBRO MENU MOBILE ────────────────────────── */
        .menu-tab {
            display: flex;
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            z-index: 300;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #fbbf24;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            padding: 18px 8px;
            border-radius: 0 10px 10px 0;
            cursor: grab;
            border: none;
            box-shadow: 3px 0 16px rgba(0,0,0,0.25);
            transition: padding 0.2s, background 0.2s, top 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            border-left: 3px solid #fbbf24;
        }
        .menu-tab:hover { padding: 18px 11px; }
        .menu-tab.open { left: 240px; border-radius: 0 10px 10px 0; border-left: none; border-right: 3px solid #fbbf24; }

        /* Overlay solo su mobile */
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 150;
            -webkit-backdrop-filter: blur(2px);
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) {
            .sidebar-overlay.active { display: block; }
        }

        @media (max-width: 768px) {
            .main { padding: 16px 14px 24px 14px !important; }
        }
    </style>
</head>
<body>
<button class="menu-tab" id="menuTab" onclick="toggleMenu()" aria-label="Menu">CDM86</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>


<div class="sidebar">
    <div class="sidebar-logo">
        <div class="brand"><i class="fas fa-handshake"></i> CDM86</div>
        <div class="subtitle">Pannello Collaboratori</div>
    </div>
    <nav>
        <a href="/collaboratori/dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/collaboratori/rete.html"><i class="fas fa-sitemap"></i> La mia rete</a>
        <a href="/collaboratori/guadagni.html"><i class="fas fa-euro-sign"></i> Guadagni</a>
        <a href="/collaboratori/task.html" class="active"><i class="fas fa-check-square"></i> Task</a>
        <a href="/collaboratori/chiamate.html"><i class="fas fa-phone"></i> Chiamate</a>
        <a href="/collaboratori/note.html"><i class="fas fa-sticky-note"></i> Note</a>
        <a href="/collaboratori/profilo.html"><i class="fas fa-user-circle"></i> Profilo</a>
    </nav>
    <div class="sidebar-user">
        <div class="name" id="sidebarName">—</div>
        <div class="email" id="sidebarEmail">—</div>
        <div class="logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Esci</div>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <div>
            <h1><i class="fas fa-check-square" style="color:#3b82f6; margin-right:10px;"></i>Task</h1>
            <p>Gestisci i tuoi task e obiettivi</p>
        </div>
        <button class="btn-primary" onclick="openModal()">
            <i class="fas fa-plus"></i> Nuovo task
        </button>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Tutti</button>
        <button class="filter-btn" onclick="setFilter('todo', this)"><i class="fas fa-circle" style="color:#94a3b8;font-size:0.65rem;"></i> Da fare</button>
        <button class="filter-btn" onclick="setFilter('in_progress', this)"><i class="fas fa-circle" style="color:#3b82f6;font-size:0.65rem;"></i> In corso</button>
        <button class="filter-btn" onclick="setFilter('done', this)"><i class="fas fa-circle" style="color:#16a34a;font-size:0.65rem;"></i> Completati</button>
        <button class="filter-btn" onclick="setFilter('high', this)"><i class="fas fa-flag" style="color:#dc2626;font-size:0.75rem;"></i> Alta priorità</button>
    </div>

    <div class="task-list" id="taskList">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
    </div>
</div>

<!-- MODAL AGGIUNGI/MODIFICA -->
<div class="modal-overlay" id="taskModal">
    <div class="modal">
        <h2 id="modalTitle">Nuovo Task</h2>
        <input type="hidden" id="editTaskId">
        <div class="form-group">
            <label>Titolo *</label>
            <input type="text" class="form-control" id="taskTitle" placeholder="es. Contattare cliente Rossi">
        </div>
        <div class="form-group">
            <label>Descrizione</label>
            <textarea class="form-control" id="taskDesc" placeholder="Note aggiuntive..."></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Priorità</label>
                <select class="form-control" id="taskPriority">
                    <option value="low">🟢 Bassa</option>
                    <option value="medium" selected>🟡 Media</option>
                    <option value="high">🔴 Alta</option>
                </select>
            </div>
            <div class="form-group">
                <label>Stato</label>
                <select class="form-control" id="taskStatus">
                    <option value="todo" selected>Da fare</option>
                    <option value="in_progress">In corso</option>
                    <option value="done">Completato</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Scadenza</label>
            <input type="date" class="form-control" id="taskDue">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Annulla</button>
            <button class="btn-save" onclick="saveTask()"><i class="fas fa-save"></i> Salva</button>
        </div>
    </div>
</div>

<script>
    let sb, currentUser, collab, allTasks = [], currentFilter = 'all';

    window.addEventListener('DOMContentLoaded', async () => {
        sb = supabase.createClient(CDM86_CONFIG.supabase.url, CDM86_CONFIG.supabase.anonKey);
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = '/collaboratori/login.html'; return; }
        currentUser = session.user;

        const { data: user } = await sb.from('collaborators').select('*').eq('auth_user_id', currentUser.id).single();
        if (!user || user.status !== 'active') { window.location.href = '/collaboratori/login.html'; return; }

        collab = user;
        document.getElementById('sidebarName').textContent  = `${user.first_name} ${user.last_name}`;
        document.getElementById('sidebarEmail').textContent = user.email;

        await loadTasks();
    });

    async function loadTasks() {
        const { data, error } = await sb
            .from('collaborator_tasks')
            .select('*')
            .eq('collaborator_id', collab.id)
            .order('created_at', { ascending: false });

        allTasks = data || [];
        renderTasks();
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTasks();
    }

    function renderTasks() {
        const container = document.getElementById('taskList');
        let tasks = allTasks;

        if (currentFilter === 'todo')        tasks = allTasks.filter(t => t.status === 'todo');
        else if (currentFilter === 'in_progress') tasks = allTasks.filter(t => t.status === 'in_progress');
        else if (currentFilter === 'done')   tasks = allTasks.filter(t => t.status === 'done');
        else if (currentFilter === 'high')   tasks = allTasks.filter(t => t.priority === 'high');

        if (tasks.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-check-square"></i>
                    <h3>Nessun task trovato</h3>
                    <p>Crea il tuo primo task cliccando "Nuovo task"</p>
                </div>`;
            return;
        }

        container.innerHTML = tasks.map(t => {
            const statusBadge = {
                todo:        '<span class="badge badge-todo"><i class="fas fa-circle" style="font-size:0.55rem;"></i> Da fare</span>',
                in_progress: '<span class="badge badge-progress"><i class="fas fa-spinner fa-spin" style="font-size:0.7rem;"></i> In corso</span>',
                done:        '<span class="badge badge-done"><i class="fas fa-check" style="font-size:0.7rem;"></i> Completato</span>'
            }[t.status] || '';

            const priorityBadge = {
                high:   '<span class="badge badge-high"><i class="fas fa-flag" style="font-size:0.65rem;"></i> Alta</span>',
                medium: '<span class="badge badge-medium"><i class="fas fa-minus" style="font-size:0.65rem;"></i> Media</span>',
                low:    '<span class="badge badge-low"><i class="fas fa-arrow-down" style="font-size:0.65rem;"></i> Bassa</span>'
            }[t.priority] || '';

            let dueDateHtml = '';
            if (t.due_date) {
                const due = new Date(t.due_date);
                const isOverdue = t.status !== 'done' && due < new Date();
                const dateStr = due.toLocaleDateString('it-IT');
                dueDateHtml = `<span class="due-date ${isOverdue ? 'overdue' : ''}"><i class="fas fa-calendar"></i> ${dateStr}${isOverdue ? ' (scaduto)' : ''}</span>`;
            }

            const checkClass = t.status === 'done' ? 'checked' : (t.status === 'in_progress' ? 'in-progress-check' : '');
            const checkIcon  = t.status === 'done' ? '<i class="fas fa-check"></i>' : (t.status === 'in_progress' ? '<i class="fas fa-minus"></i>' : '');

            return `
            <div class="task-card ${t.status === 'done' ? 'done' : ''}" id="tc-${t.id}">
                <div class="task-check ${checkClass}" onclick="cycleStatus('${t.id}', '${t.status}')" title="Cambia stato">${checkIcon}</div>
                <div class="task-body">
                    <div class="task-title">${escHtml(t.title)}</div>
                    ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
                    <div class="task-meta">
                        ${statusBadge}
                        ${priorityBadge}
                        ${dueDateHtml}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="icon-btn" onclick="editTask('${t.id}')" title="Modifica"><i class="fas fa-pen"></i></button>
                    <button class="icon-btn delete" onclick="deleteTask('${t.id}')" title="Elimina"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    async function cycleStatus(id, current) {
        const next = { todo: 'in_progress', in_progress: 'done', done: 'todo' }[current];
        await sb.from('collaborator_tasks').update({ status: next }).eq('id', id);
        const task = allTasks.find(t => t.id == id);
        if (task) task.status = next;
        renderTasks();
    }

    function openModal(task = null) {
        document.getElementById('taskModal').classList.add('open');
        document.getElementById('editTaskId').value  = task ? task.id : '';
        document.getElementById('modalTitle').textContent = task ? 'Modifica Task' : 'Nuovo Task';
        document.getElementById('taskTitle').value    = task ? task.title : '';
        document.getElementById('taskDesc').value     = task ? (task.description || '') : '';
        document.getElementById('taskPriority').value = task ? task.priority : 'medium';
        document.getElementById('taskStatus').value   = task ? task.status : 'todo';
        document.getElementById('taskDue').value      = task ? (task.due_date || '') : '';
    }

    function closeModal() {
        document.getElementById('taskModal').classList.remove('open');
    }

    function editTask(id) {
        const task = allTasks.find(t => t.id == id);
        if (task) openModal(task);
    }

    async function saveTask() {
        const id    = document.getElementById('editTaskId').value;
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) { alert('Il titolo è obbligatorio'); return; }

        const payload = {
            title,
            description: document.getElementById('taskDesc').value.trim() || null,
            priority:    document.getElementById('taskPriority').value,
            status:      document.getElementById('taskStatus').value,
            due_date:    document.getElementById('taskDue').value || null,
        };

        if (id) {
            const { error } = await sb.from('collaborator_tasks').update(payload).eq('id', id);
            if (error) { alert('Errore: ' + error.message); return; }
        } else {
            payload.collaborator_id = collab.id;
            const { error } = await sb.from('collaborator_tasks').insert(payload);
            if (error) { alert('Errore: ' + error.message); return; }
        }

        closeModal();
        await loadTasks();
    }

    async function deleteTask(id) {
        if (!confirm('Eliminare questo task?')) return;
        await sb.from('collaborator_tasks').delete().eq('id', id);
        allTasks = allTasks.filter(t => t.id != id);
        renderTasks();
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function logout() {
        await sb.auth.signOut();
        window.location.href = '/collaboratori/login.html';
    }

    // Chiudi modal cliccando fuori
    document.getElementById('taskModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

        /* ── Menu tab: toggle + drag verticale ── */
        (function() {
            const STORAGE_KEY = 'cdm86_tab_top';
            let isDragging = false;
            let dragStartY = 0;
            let tabStartTop = 0;
            let movedEnough = false;

            function getTab() { return document.getElementById('menuTab'); }

            function applyStoredPosition() {
                const tab = getTab();
                if (!tab) return;
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    tab.style.top = saved;
                    tab.style.transform = 'none';
                } else {
                    tab.style.top = '50%';
                    tab.style.transform = 'translateY(-50%)';
                }
            }

            function onDragStart(e) {
                const tab = getTab();
                isDragging = false;
                movedEnough = false;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragStartY = clientY;
                // Converti top% in px se necessario
                const rect = tab.getBoundingClientRect();
                tabStartTop = rect.top + rect.height / 2;
                tab.style.transition = 'padding 0.2s, background 0.2s';
                tab.style.cursor = 'grabbing';

                document.addEventListener('mousemove', onDragMove, {passive:false});
                document.addEventListener('touchmove', onDragMove, {passive:false});
                document.addEventListener('mouseup', onDragEnd);
                document.addEventListener('touchend', onDragEnd);
            }

            function onDragMove(e) {
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const dy = clientY - dragStartY;
                if (Math.abs(dy) > 6) {
                    isDragging = true;
                    movedEnough = true;
                    if (e.cancelable) e.preventDefault();
                }
                if (!isDragging) return;
                const tab = getTab();
                let newTop = tabStartTop + dy;
                // Clamp tra 40px e altezza schermo - 40px
                const minTop = 40;
                const maxTop = window.innerHeight - 40;
                newTop = Math.max(minTop, Math.min(maxTop, newTop));
                tab.style.top = newTop + 'px';
                tab.style.transform = 'none';
            }

            function onDragEnd(e) {
                document.removeEventListener('mousemove', onDragMove);
                document.removeEventListener('touchmove', onDragMove);
                document.removeEventListener('mouseup', onDragEnd);
                document.removeEventListener('touchend', onDragEnd);
                const tab = getTab();
                tab.style.cursor = 'grab';
                tab.style.transition = 'padding 0.2s, background 0.2s, top 0.15s ease';
                if (movedEnough) {
                    localStorage.setItem(STORAGE_KEY, tab.style.top);
                }
            }

            window.toggleMenu = function() {
                if (movedEnough) { movedEnough = false; return; }
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                const tab     = getTab();
                const isOpen  = sidebar.classList.toggle('open');
                // Overlay solo su mobile
                if (window.innerWidth <= 768) {
                    overlay.classList.toggle('active', isOpen);
                }
                tab.classList.toggle('open', isOpen);
                document.body.classList.toggle('sidebar-open', isOpen);
            };

            window.addEventListener('DOMContentLoaded', function() {
                applyStoredPosition();
                const tab = getTab();
                if (!tab) return;
                tab.addEventListener('mousedown', onDragStart);
                tab.addEventListener('touchstart', onDragStart, {passive:true});
            });
        })();
    </script>
</body>
</html>
