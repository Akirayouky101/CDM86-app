<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CDM86</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .splash {
            text-align: center;
            color: white;
        }
        .splash-logo {
            font-size: 3rem;
            font-weight: 900;
            color: #fbbf24;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .splash-sub {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .splash-version {
            font-size: 0.75rem;
            color: #475569;
            margin-top: 4px;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(251,191,36,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 28px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash-logo">CDM86</div>
        <div class="splash-sub">Promozioni Esclusive</div>
        <div class="spinner"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uchrjlngfzfibcpdxtky.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjaHJqbG5nZnpmaWJjcGR4dGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE5NzMzMzUsImV4cCI6MjA1NzU0OTMzNX0.y7PoGMTBpIwFMGFhhJn9nBcMwR2tsOzuCeFl1rkMpyA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                // Controlla se è un collaboratore
                const { data: collab } = await sb.from('collaborators')
                    .select('id')
                    .eq('user_id', session.user.id)
                    .single();

                if (collab) {
                    window.location.href = 'collaboratori/dashboard.html';
                } else {
                    window.location.href = 'public/promotions.html';
                }
            } else {
                // Non loggato → pagina promozioni (visibile anche senza login)
                window.location.href = 'public/promotions.html';
            }
        })();
    </script>
</body>
</html>
