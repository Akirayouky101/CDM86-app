<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CDM86</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── VIDEO INTRO ── */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #skip-btn {
            position: absolute;
            bottom: 40px;
            right: 24px;
            background: rgba(255,255,255,0.18);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }
        #skip-btn:hover { background: rgba(255,255,255,0.3); }

        /* ── SPLASH (visibile dopo il video) ── */
        #splash-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            align-items: center;
            justify-content: center;
        }
        #splash-screen.visible {
            display: flex;
        }
        .splash {
            text-align: center;
            color: white;
        }
        .splash-logo {
            font-size: 3rem;
            font-weight: 900;
            color: #fbbf24;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .splash-sub {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .splash-version {
            font-size: 0.75rem;
            color: #475569;
            margin-top: 4px;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(251,191,36,0.3);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 28px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- VIDEO INTRO -->
    <div id="intro-overlay">
        <video id="intro-video" autoplay muted playsinline>
            <source src="/introcdm86.mp4" type="video/mp4">
        </video>
        <button id="skip-btn" onclick="skipIntro()">Salta ›</button>
    </div>

    <!-- SPLASH (mostrata mentre fa il check auth) -->
    <div id="splash-screen">
        <div class="splash">
            <div class="splash-logo">CDM86</div>
            <div class="splash-sub">Promozioni Esclusive</div>
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uchrjlngfzfibcpdxtky.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjaHJqbG5nZnpmaWJjcGR4dGt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE5NzMzMzUsImV4cCI6MjA1NzU0OTMzNX0.y7PoGMTBpIwFMGFhhJn9nBcMwR2tsOzuCeFl1rkMpyA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let redirectDone = false;

        // Avvia il check auth in parallelo al video
        const authPromise = (async () => {
            const { data: { session } } = await sb.auth.getSession();
            // I collaboratori accedono solo da cdm86.io, qui trattiamo tutti come utenti normali
            return session ? 'public/promotions.html' : 'public/promotions.html';
        })();

        async function doRedirect() {
            if (redirectDone) return;
            redirectDone = true;
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('splash-screen').classList.add('visible');
            const dest = await authPromise;
            window.location.href = dest;
        }

        function skipIntro() {
            const video = document.getElementById('intro-video');
            video.pause();
            doRedirect();
        }

        // Quando il video finisce → redirect
        document.getElementById('intro-video').addEventListener('ended', doRedirect);

        // Fallback: se il video non si carica entro 1.5s → salta
        document.getElementById('intro-video').addEventListener('error', doRedirect);
        setTimeout(() => {
            const video = document.getElementById('intro-video');
            if (!video.duration && !redirectDone) doRedirect();
        }, 1500);
    </script>
</body>
</html>
